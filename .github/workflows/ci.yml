name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  libs-core:
    name: Libraries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p tinyboot -p tinyboot-protocol --all-targets -- -D warnings
      - run: cargo build -p tinyboot -p tinyboot-protocol
      - run: cargo test -p tinyboot -p tinyboot-protocol
      - run: cargo doc -p tinyboot -p tinyboot-protocol --no-deps
      - run: cargo build -p tinyboot -p tinyboot-protocol --release

  libs-ch32:
    name: Libraries CH32 (${{ matrix.chip }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chip:
          - ch32v003f4p6
          - ch32v003a4m6
          - ch32v003f4u6
          - ch32v003j4m6
          - ch32v003x4x6
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --profile minimal --component rust-src,clippy
      - run: cargo +nightly clippy -p tinyboot-ch32-hal -p tinyboot-ch32-boot -p tinyboot-ch32-app --features ${{ matrix.chip }} --target examples/ch32/system-flash/riscv32ec-unknown-none-elf.json -Zbuild-std=core -Zjson-target-spec -- -D warnings
      - run: cargo +nightly build -p tinyboot-ch32-hal -p tinyboot-ch32-boot -p tinyboot-ch32-app --features ${{ matrix.chip }} --target examples/ch32/system-flash/riscv32ec-unknown-none-elf.json -Zbuild-std=core -Zjson-target-spec --release
      - run: cargo +nightly doc -p tinyboot-ch32-hal -p tinyboot-ch32-boot -p tinyboot-ch32-app --features ${{ matrix.chip }} --target examples/ch32/system-flash/riscv32ec-unknown-none-elf.json -Zbuild-std=core -Zjson-target-spec --no-deps

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tinyboot-cli
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - run: rustup toolchain install stable --profile minimal --component rustfmt,clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo build
      - run: cargo build --release

  examples:
    name: Examples
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [system-flash, user-flash]
    defaults:
      run:
        working-directory: examples/ch32/${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install nightly --profile minimal --component rust-src,rustfmt,clippy
      - run: cargo +nightly fmt --all -- --check
      - run: cargo +nightly clippy -- -D warnings
      - run: cargo +nightly build --release
